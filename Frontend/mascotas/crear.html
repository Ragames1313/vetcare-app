<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetCare | Crear mascota</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <nav class="topbar" aria-label="Navegacion principal">
      <a class="brand" href="index.html">
        <span class="brand-mark">VC</span>
        <span>VetCare</span>
      </a>
      <a class="nav-link" href="index.html">Volver al listado</a>
    </nav>
  </header>

  <main class="page-shell narrow">
    <!-- Cabecera de la vista -->
    <section class="page-heading compact">
      <div>
        <p class="eyebrow">Alta de paciente</p>
        <h1>Nueva mascota</h1>
        <p class="heading-text">Formulario preparado para conectar mas adelante con la API.</p>
      </div>
    </section>

    <!-- Formulario de creacion -->
    <section class="content-panel">
      <form class="pet-form" action="#" method="post">
        <!-- Datos principales -->
        <div class="form-grid">
          <label>
            Nombre
            <input type="text" name="nombre" placeholder="Ej. Luna">
          </label>
          <label>
            ID dueno
            <input type="number" name="id_dueno" placeholder="Ej. 1">
          </label>
          <label>
            Especie
            <input type="text" name="especie" placeholder="Ej. Perro">
          </label>
          <label>
            Raza
            <input type="text" name="raza" placeholder="Ej. Labrador">
          </label>
          <label>
            Fecha de nacimiento
            <input type="date" name="fecha_nacimiento">
          </label>
          <label>
            Sexo
            <select name="sexo">
              <option>Hembra</option>
              <option>Macho</option>
              <option>No indicado</option>
            </select>
          </label>
          <label>
            Peso
            <input type="number" name="peso" placeholder="Ej. 24.5" step="0.1">
          </label>
        </div>

        <!-- Observaciones -->
        <label>
          Observaciones
          <textarea name="observaciones" rows="4" placeholder="Notas relevantes de la mascota"></textarea>
        </label>

        <!-- Acciones del formulario -->
        <div class="form-actions">
          <a class="button ghost" href="index.html">Cancelar</a>
          <button class="button primary" type="submit">Guardar mascota</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
