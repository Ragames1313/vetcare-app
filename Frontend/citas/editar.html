<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetCare | Editar cita</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <nav class="topbar" aria-label="Navegacion principal">
      <a class="brand" href="../mascotas/index.html">
        <span class="brand-mark">VC</span>
        <span>VetCare</span>
      </a>
      <a class="nav-link" href="detalle.html">Volver al detalle</a>
    </nav>
  </header>

  <main class="page-shell narrow">
    <!-- Cabecera de la vista -->
    <section class="page-heading compact">
      <div>
        <p class="eyebrow">Editar cita</p>
        <h1>Revision general</h1>
        <p class="heading-text">Vista preparada para actualizar los datos de una cita.</p>
      </div>
    </section>

    <!-- Formulario de edicion -->
    <section class="content-panel">
      <form class="pet-form" action="#" method="post">
        <!-- Datos principales -->
        <div class="form-grid">
          <label>
            ID mascota
            <input type="number" name="id_mascota" value="1">
          </label>
          <label>
            ID veterinario
            <input type="number" name="id_veterinario" value="1">
          </label>
          <label>
            Fecha
            <input type="date" name="fecha" value="2026-06-15">
          </label>
          <label>
            Hora
            <input type="time" name="hora" value="10:30">
          </label>
          <label>
            Motivo
            <input type="text" name="motivo" value="Revision general">
          </label>
          <label>
            Estado
            <select name="estado">
              <option selected>Pendiente</option>
              <option>Confirmada</option>
              <option>Finalizada</option>
            </select>
          </label>
        </div>

        <!-- Observaciones -->
        <label>
          Observaciones
          <textarea name="observaciones" rows="4">Primera visita de revision. Comprobar vacunas.</textarea>
        </label>

        <!-- Acciones del formulario -->
        <div class="form-actions">
          <a class="button ghost" href="detalle.html">Cancelar</a>
          <button class="button primary" type="submit">Guardar cambios</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
